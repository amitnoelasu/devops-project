version: 0.2

env:
  variables:
    TERRAFORM_VERSION: "1.14.3"
    TF_COMMAND: "apply"
    #TF_COMMAND: "destroy"
  parameter-store:
    AWS_ACCESS_KEY_ID: "/CodeBuild/MY_AWS_ACCESS_KEY_ID"
    AWS_SECRET_ACCESS_KEY: "/CodeBuild/MY_AWS_SECRET_ACCESS_KEY"
    AWS_EC2_PRIVATE_KEY: "/CodeBuild/EC2_private_key"
    AWS_DEV_CONF: "/CodeBuild/dev.conf"
    AWS_DEV_TFVARS: "/CodeBuild/dev.tfvars"

phases:
  install:
    runtime-versions:
      python: 3.7
    on-failure: ABORT       
    commands:
      - tf_version=$TERRAFORM_VERSION
      - wget https://releases.hashicorp.com/terraform/"$TERRAFORM_VERSION"/terraform_"$TERRAFORM_VERSION"_linux_amd64.zip
      - unzip terraform_"$TERRAFORM_VERSION"_linux_amd64.zip
      - mv terraform /usr/local/bin/
  pre_build:
    on-failure: ABORT     
    commands:
      - echo terraform execution started on `date`           
  build:
    on-failure: ABORT   
    commands:
    # Project-1: AWS VPC, ASG, ALB, ACM, Security Groups and SNS 
      - cd "$CODEBUILD_SRC_DIR"
      - mkdir -p private-key
      - cd private-key
      - echo "$AWS_EC2_PRIVATE_KEY" > terraform-pk.pem
      - chmod 400 terraform-pk.pem
      - cd "$CODEBUILD_SRC_DIR"
      - echo "$AWS_DEV_CONF" > dev.conf
      - echo "$AWS_DEV_TFVARS" > dev.tfvars
      - ls -lrt "$CODEBUILD_SRC_DIR"
      - terraform --version
      - terraform init -input=false --backend-config=dev.conf
      - terraform validate
      - terraform plan -lock=false -input=false -var-file=dev.tfvars           
      - terraform $TF_COMMAND -input=false -var-file=dev.tfvars -auto-approve  
  post_build:
    on-failure: CONTINUE   
    commands:
      - echo terraform execution completed on `date`      


    